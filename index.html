    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- 🔥 TITLE (SEO + Branding) -->
    <title>MamaTochterOnTour – Reiseinspiration, Reiseguides & echte Travel Stories</title>

    <!-- 🔍 META DESCRIPTION (WICHTIGSTER SEO TEXT) -->
    <meta
      name="description"
      content="MamaTochterOnTour ist ein Reiseprojekt mit echten Reiseerfahrungen, Guides und Inspiration für deine nächsten Abenteuer weltweit – authentisch, persönlich und unterwegs erstellt."
    />

    <!-- ❗ KEYWORDS (optional – Google ignoriert es weitgehend) -->

      name="keywords"
      content="Reiseblog, Reiseinspiration, Reiseguides, Travel Blog, Mallorca Reisen, Reise App, Mama Tochter Reisen, Travel Stories"

    <meta property="og:site_name" content="MamaTochterOnTour" />

      property="og:description"
      content="Echte Reiseerlebnisse, Guides und Inspiration für deine nächsten Abenteuer weltweit."
    />
    <meta property="og:url" content="https://mamatochterontour.de" />

    <meta property="og:image:width" content="1200" />
